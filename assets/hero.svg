<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131622"/>
      <stop offset="1" stop-color="#0C0E16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8A63D2"/>
      <stop offset="0.5" stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8A63D2" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" rx="3" fill="url(#accent)"/>

  <!-- faint map->territory grid motif -->
  <g stroke="#2A2E3D" stroke-width="1" opacity="0.5">
    <path d="M760 60 L1140 60 M760 110 L1140 110 M760 160 L1140 160 M760 210 L1140 210 M760 260 L1140 260"/>
    <path d="M820 40 L820 280 M900 40 L900 280 M980 40 L980 280 M1060 40 L1060 280"/>
  </g>
  <path d="M770 250 C860 120, 980 230, 1130 80" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="770" cy="250" r="6" fill="#8A63D2"/>
  <circle cx="1130" cy="80" r="6" fill="#2DD4BF"/>
  <rect x="740" y="40" width="420" height="240" rx="12" fill="url(#fade)"/>

  <text x="64" y="120" font-size="58" font-weight="700" fill="#F4F5F7" letter-spacing="-1">finding-unknowns</text>
  <text x="66" y="164" font-size="24" fill="#94A3B8" font-style="italic">The map is not the territory.</text>
  <text x="66" y="200" font-size="17" fill="#C7CAD1">A Claude Code skill for surfacing your unknowns —</text>
  <text x="66" y="224" font-size="17" fill="#C7CAD1">before they get expensive to fix.</text>

  <!-- phase pills -->
  <g font-size="15" font-weight="600">
    <rect x="66" y="252" width="120" height="34" rx="17" fill="#1E2233" stroke="#8A63D2"/>
    <text x="126" y="274" fill="#C9B6F2" text-anchor="middle">① Pre</text>
    <rect x="198" y="252" width="140" height="34" rx="17" fill="#1E2233" stroke="#5B8DEF"/>
    <text x="268" y="274" fill="#AFC6F6" text-anchor="middle">② During</text>
    <rect x="350" y="252" width="120" height="34" rx="17" fill="#1E2233" stroke="#2DD4BF"/>
    <text x="410" y="274" fill="#9BEBDD" text-anchor="middle">③ Post</text>
    <rect x="486" y="252" width="168" height="34" rx="17" fill="#171A26" stroke="#3A3F52"/>
    <text x="570" y="274" fill="#94A3B8" text-anchor="middle">8 techniques</text>
  </g>
</svg>
