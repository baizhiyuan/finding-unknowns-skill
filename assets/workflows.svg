<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="wa" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#5B6172"/></marker>
    <linearGradient id="wacc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8A63D2"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient>
  </defs>
  <rect width="1000" height="520" rx="16" fill="#0F111A"/>
  <rect x="0" y="0" width="1000" height="5" rx="2" fill="url(#wacc)"/>
  <text x="500" y="42" font-size="21" font-weight="700" fill="#F4F5F7" text-anchor="middle">Dynamic-workflow orchestration — deterministic fan-out / verify / merge</text>

  <!-- Template 1: multi-lens sweep -->
  <text x="50" y="86" font-size="14" font-weight="700" fill="#F6C572">① fu-multi-lens-sweep · seed the ledger</text>
  <rect x="50" y="98" width="130" height="40" rx="9" fill="#241521" stroke="#F59E0B"/>
  <text x="115" y="123" font-size="12" fill="#F6C572" text-anchor="middle">scout: domain-risk</text>
  <rect x="50" y="146" width="130" height="40" rx="9" fill="#241521" stroke="#F59E0B"/>
  <text x="115" y="171" font-size="12" fill="#F6C572" text-anchor="middle">scout: engineering</text>
  <rect x="50" y="194" width="130" height="40" rx="9" fill="#241521" stroke="#F59E0B"/>
  <text x="115" y="219" font-size="12" fill="#F6C572" text-anchor="middle">scout: statistics</text>

  <line x1="180" y1="118" x2="230" y2="118" stroke="#5B6172" stroke-width="1.5" marker-end="url(#wa)"/>
  <line x1="180" y1="166" x2="230" y2="166" stroke="#5B6172" stroke-width="1.5" marker-end="url(#wa)"/>
  <line x1="180" y1="214" x2="230" y2="214" stroke="#5B6172" stroke-width="1.5" marker-end="url(#wa)"/>

  <rect x="232" y="98" width="150" height="136" rx="9" fill="#0F1C1A" stroke="#2DD4BF"/>
  <text x="307" y="126" font-size="12.5" font-weight="600" fill="#9BEBDD" text-anchor="middle">adversarial verify</text>
  <text x="307" y="146" font-size="11.5" fill="#7FC5BA" text-anchor="middle">per finding, as its</text>
  <text x="307" y="163" font-size="11.5" fill="#7FC5BA" text-anchor="middle">lens completes</text>
  <text x="307" y="188" font-size="11" fill="#58948A" text-anchor="middle" font-style="italic">pipeline — no barrier,</text>
  <text x="307" y="205" font-size="11" fill="#58948A" text-anchor="middle" font-style="italic">no waiting on the</text>
  <text x="307" y="222" font-size="11" fill="#58948A" text-anchor="middle" font-style="italic">slowest lens</text>

  <line x1="382" y1="166" x2="428" y2="166" stroke="#5B6172" stroke-width="1.5" marker-end="url(#wa)"/>

  <rect x="430" y="120" width="120" height="92" rx="9" fill="#12151F" stroke="#3A3F52"/>
  <text x="490" y="148" font-size="12.5" font-weight="600" fill="#C7CAD1" text-anchor="middle">dedup vs ALL</text>
  <text x="490" y="166" font-size="12.5" font-weight="600" fill="#C7CAD1" text-anchor="middle">seen findings</text>
  <text x="490" y="192" font-size="11" fill="#8A909E" text-anchor="middle" font-style="italic">cross-lens dupes =</text>
  <text x="490" y="207" font-size="11" fill="#8A909E" text-anchor="middle" font-style="italic">confirmation</text>

  <line x1="550" y1="166" x2="596" y2="166" stroke="#5B6172" stroke-width="1.5" marker-end="url(#wa)"/>

  <rect x="598" y="120" width="150" height="92" rx="9" fill="#0F1622" stroke="#5B8DEF"/>
  <text x="673" y="150" font-size="12.5" font-weight="600" fill="#AFC6F6" text-anchor="middle">schema-validated</text>
  <text x="673" y="168" font-size="12.5" font-weight="600" fill="#AFC6F6" text-anchor="middle">ledger rows</text>
  <text x="673" y="194" font-size="11" fill="#64769B" text-anchor="middle" font-style="italic">→ ledger-keeper seeds C0</text>

  <!-- Template 2: verify panel -->
  <text x="50" y="290" font-size="14" font-weight="700" fill="#9BEBDD">② fu-verify-panel · cost ≥ 4 resolutions</text>
  <rect x="50" y="302" width="152" height="34" rx="8" fill="#0F1C1A" stroke="#2DD4BF"/>
  <text x="126" y="324" font-size="11.5" fill="#7FC5BA" text-anchor="middle">alternative-explanation</text>
  <rect x="50" y="344" width="152" height="34" rx="8" fill="#0F1C1A" stroke="#2DD4BF"/>
  <text x="126" y="366" font-size="11.5" fill="#7FC5BA" text-anchor="middle">evidence-independence</text>
  <rect x="50" y="386" width="152" height="34" rx="8" fill="#0F1C1A" stroke="#2DD4BF"/>
  <text x="126" y="408" font-size="11.5" fill="#7FC5BA" text-anchor="middle">reproduction</text>
  <line x1="202" y1="361" x2="248" y2="361" stroke="#5B6172" stroke-width="1.5" marker-end="url(#wa)"/>
  <rect x="250" y="330" width="200" height="62" rx="9" fill="#12151F" stroke="#3A3F52"/>
  <text x="350" y="355" font-size="12.5" fill="#6FB3AA" font-weight="600" text-anchor="middle">≥2 fail to refute → resolved</text>
  <text x="350" y="376" font-size="12.5" fill="#F0B75A" font-weight="600" text-anchor="middle">else → resolved-provisional</text>
  <text x="250" y="416" font-size="10.5" fill="#8A909E" font-style="italic">refuters' discriminating checks land in the ledger</text>

  <!-- Template 3: UU until dry -->
  <text x="540" y="290" font-size="14" font-weight="700" fill="#C9B6F2">③ fu-uu-until-dry · probe the shallow quadrant</text>
  <rect x="540" y="302" width="410" height="118" rx="9" fill="#160F26" stroke="#8A63D2"/>
  <text x="560" y="330" font-size="12.5" fill="#D9C7F5">round n: differently-angled probes (failure-modes,</text>
  <text x="560" y="349" font-size="12.5" fill="#D9C7F5">adversarial-user, scale, maintenance, …)</text>
  <text x="560" y="376" font-size="12.5" fill="#A99BC9">new unknowns? → add rows, reset dry counter</text>
  <text x="560" y="398" font-size="12.5" fill="#D9C7F5">none? → dry++ · stop at two consecutive dry rounds</text>
  <text x="540" y="442" font-size="11" fill="#7A6BA0" font-style="italic">bounded by information, not by a fixed round count — empty results are results</text>

  <!-- fallback ladder -->
  <rect x="770" y="98" width="180" height="136" rx="9" fill="#101822" stroke="#2DD4BF" stroke-dasharray="6 4"/>
  <text x="860" y="124" font-size="12.5" font-weight="700" fill="#9BEBDD" text-anchor="middle">Fallback ladder</text>
  <text x="860" y="150" font-size="11.5" fill="#7FC5BA" text-anchor="middle">1. Workflow scripts</text>
  <text x="860" y="172" font-size="11.5" fill="#7FC5BA" text-anchor="middle">2. parallel Agent calls</text>
  <text x="860" y="194" font-size="11.5" fill="#7FC5BA" text-anchor="middle">3. fully inline</text>
  <text x="860" y="220" font-size="10.5" fill="#58948A" text-anchor="middle" font-style="italic">logic normative, not mechanism</text>

  <text x="500" y="490" font-size="13" fill="#94A3B8" text-anchor="middle">Invariants on every rung: named lenses · adversarial check before resolve · dedup vs seen · empty results reported as results.</text>
</svg>
